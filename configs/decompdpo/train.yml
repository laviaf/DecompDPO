data:
  name: pl
  path: ./data/crossdocked_v1.1_rmsd1.0_processed
  mode: full
  include_dummy_atoms: False
  version: ref_prior_aromatic_decompdpo
  prior_mode: ref_prior
  ori_pair_path: ./data/training_pairs.pt
  processed_pair_path: ./data/processed_pairs.pt
  transform:
    add_ord_feat: False
    ligand_atom_mode: basic
    ligand_bond_mode: fc
    max_num_arms: 10
    random_rot: False
    has_recon_failed_data: True
    amber_constrain: True
    bond_info_path: ./data/bond_stat.pt
    angle_info_path: ./data/angle_stat.pt
    amber_dataset_config: ./configs/preprocessing/amber_energy.yml

dpo:
  reference_model_ckpt: ./checkpoints/decompdiff_bv_sche.pt

model:
  model_mean_type: C0  # ['noise', 'C0']

  v_beta_schedule: cosine
  v_beta_s: 0.01
  num_diffusion_timesteps: 1000

  v_mode: categorical
  v_net_type: mlp
  loss_pos_type: mse  # ['mse', 'kl']
  sample_time_method: symmetric  # ['importance', 'symmetric']

  bond_diffusion: True
  bond_net_type: lin
  num_bond_classes: 5
  prior_types: False
  h_node_in_bond_net: True

  add_prior_node: False

  time_emb_dim: 0
  time_emb_mode: simple
  center_pos_mode: protein

  node_indicator: True
  model_type: uni_o2_bond
  num_blocks: 1
  num_layers: 6
  hidden_dim: 128
  n_heads: 16
  edge_feat_dim: 4  # edge type feat
  num_r_gaussian: 20
  knn: 32
  act_fn: relu
  norm: True
  cutoff_mode: knn  # [radius, none]
  r_max: 10.
  x2h_out_fc: False
  sync_twoup: False

  # Moldiff schedule
  diff_pos:
    beta_schedule: sigmoid
    beta_start: 1.e-7
    beta_end: 2.e-3
  diff_atom:
    beta_schedule: advance
    scale_start: 0.9999
    scale_end: 5.e-5
    width: 3
  diff_bond:
    beta_schedule: segment
    time_segment: [600, 400]
    segment_diff:
      - scale_start: 0.9999
        scale_end: 0.001
        width: 3
      - scale_start: 0.001
        scale_end: 5.e-5
        width: 2

train:
  seed: 2021
  loss_weights:
    pos: 1.0
    v: 100.0
    bond: 100.0
  beta: 0.001  # regularization term of reward
  amber_lambda: 0.1

  batch_size: 4
  num_workers: 0   # set to 0 for in-process loading; increase if sufficient RAM
  n_acc_batch: 1
  max_iters: 40000
  save_freq: 1000
  pos_noise_std: 0.1
  prior_noise_std: 0.5
  max_grad_norm: 8.0
  bond_loss_weight: 1.0
  optimizer:
    type: adam
    lr: 1.e-6
    weight_decay: 0
    beta1: 0.95
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.6
    patience: 5
    min_lr: 1.e-8
